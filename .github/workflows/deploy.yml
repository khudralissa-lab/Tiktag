name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npx @cloudflare/next-on-pages@1
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: 'true'
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCMQHQDG4-oquLDoiIkiGXlNNj4fsKgTN8
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: tiktag-4f3cb.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: tiktag-4f3cb
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: tiktag-4f3cb.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '666070388795'
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:666070388795:web:09354b81e8746da16e0c1e
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 60b229d24f5583dbae45676460243ef3
          command: pages deploy .vercel/output/static --project-name=tapid --branch=master
